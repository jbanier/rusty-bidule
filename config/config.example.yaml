prompt: |
  You are a CSIRT investigation assistant.
  Stay grounded in MCP tool output, cite concrete evidence when tools run,
  and be explicit about failures or uncertainty.

data_dir: data

llm_provider: azure_openai

azure_openai:
  api_key: env:AZURE_OPENAI_API_KEY
  api_version: 2025-03-01-preview
  endpoint: https://example.cognitiveservices.azure.com/
  deployment: gpt-4.1
  temperature: 0.2
  top_p: 1.0
  max_output_tokens: 1200
  max_advertised_tools: 128

# Optional alternate backend. If both blocks are present, set llm_provider
# explicitly to choose between them.
# azure_anthropic:
#   api_key: env:AZURE_ANTHROPIC_API_KEY
#   anthropic_version: 2023-06-01
#   endpoint: https://example.services.ai.azure.com/anthropic/
#   deployment: claude-opus-4-6
#   temperature: 0.2
#   max_output_tokens: 1200
#   max_advertised_tools: 128

# Optional OpenAI-compatible gateway/backend. Use this for LiteLLM Proxy,
# OpenRouter, Vercel AI Gateway, Ollama/vLLM, or similar endpoints.
# Include /v1 in base_url when your gateway expects OpenAI-style /v1 routes.
# openai_compatible:
#   api_key: env:LITELLM_PROXY_API_KEY
#   base_url: http://127.0.0.1:4000/v1
#   model: gpt-5
#   temperature: 0.2
#   top_p: 1.0
#   max_output_tokens: 1200
#   max_advertised_tools: 128

agent_permissions:
  allow_network: false
  filesystem: read_only
  yolo: false

local_tools:
  execution_timeout_seconds: 180
  allowed_cli_tools:
    - nmap
    - vt
    - dig
    - whois
    - nslookup

skills:
  # User-level skill directories and bundled repo skills are enabled by default.
  # Project-local .agents/.claude/.rusty-bidule skills are only loaded when the
  # project root is listed here, or when project_skills is set to "always".
  project_skills: trusted_only # trusted_only | always | disabled
  trusted_project_roots: []

mcp_runtime:
  connect_timeout_seconds: 180

# Optional. Leave empty or remove the whole block to run without MCP servers.
mcp_servers:
  - name: csirt-mcp
    transport: streamable_http
    url: http://127.0.0.1:5000/mcp
    headers:
      Authorization: Bearer None
    timeout: 30
    sse_read_timeout: 300
    client_session_timeout_seconds: 30

  - name: chrome-devtools
    transport: stdio
    command: npx
    args:
      - -y
      - chrome-devtools-mcp@latest

  - name: wiz
    transport: streamable_http
    url: https://mcp.app.wiz.io
    headers:
      Wiz-DataCenter: us12
    timeout: 30
    sse_read_timeout: 300
    client_session_timeout_seconds: 30
    auth:
      type: oauth_public
      scopes:
        - read:all
        - offline_access
      client_id: null
      client_secret: null
      token_endpoint_auth_method: none
      resource: https://mcp.app.wiz.io/
      redirect_uri: http://localhost:8766/callback
      redirect_host: localhost
      redirect_port: 8766
      redirect_path: /callback
      callback_timeout_seconds: 300
      open_browser: true
      use_dynamic_client_registration: true
